<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pure JS Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="carousel">
    <div class="slides" id="slides">
      <div class="slide">
        <img src="images/sunset-1.jpg" alt="Slide 1" />
      </div>
      <div class="slide">
        <img src="images/exibi-2.jpeg" alt="Slide 2" />
      </div>
      <div class="slide">
        <img src="images/sky-3.jpg" alt="Slide 3" />
      </div>
    </div>

    <button class="btn prev" id="prev">&#10094;</button>
    <button class="btn next" id="next">&#10095;</button>

    <div class="dots" id="dots"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
